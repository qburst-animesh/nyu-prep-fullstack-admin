AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Core CloudFormation template for the CSV processor stack. This template
  contains non-realtime resources: S3 bucket (optional), Lambda roles and
  the primary Lambda functions. Realtime infra (SQS, API Gateway, WebSocket,
  EventSourceMappings) is deployed separately by the realtime template.

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket used for CSV uploads (can be new or existing).

  SummaryBucketName:
    Type: String
    Description: Name of the S3 bucket used to store generated summary JSONs (must be globally unique, lowercase).
    Default: csv-summary

  LambdaS3CodeBucket:
    Type: String
    Description: S3 bucket that holds the Lambda deployment package (zip).

  LambdaS3CodeKey:
    Type: String
    Description: S3 key for the Lambda zip file (object key).

  BackendVerifyUrl:
    Type: String
    Description: Full URL of the backend verify endpoint (e.g. https://api.example.com/api/v1/files/verify).

  BackendBaseUrl:
    Type: String
    Description: Base URL of the backend service (e.g. https://api.example.com) used by delete lambda callbacks.

  VerifySecret:
    Type: String
    Description: Secret token the Lambda will include in the X-Verify-Token header when calling the backend.
    NoEcho: true

  LambdaFunctionName:
    Type: String
    Default: csv-processor-lambda

  DeleteLambdaFunctionName:
    Type: String
    Default: csv-delete-lambda

  LambdaRuntime:
    Type: String
    Default: python3.12

  LambdaMemory:
    Type: Number
    Default: 1024

  LambdaTimeout:
    Type: Number
    Default: 300

  MaxRowsToValidate:
    Type: Number
    Default: 1000

  ValidateFullFile:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']

  CreateBucket:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Select 'true' to create a new bucket; select 'false' if using an already existing bucket.

  CreateSummaryBucket:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Select 'true' to create the summary bucket; select 'false' if using an existing summary bucket.

Conditions:
  CreateBucketCondition: !Equals [ !Ref CreateBucket, 'true' ]
  CreateSummaryBucketCondition: !Equals [ !Ref CreateSummaryBucket, 'true' ]

Resources:
  CsvBucket:
    Condition: CreateBucketCondition
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName

  CsvSummaryBucket:
    Condition: CreateSummaryBucketCondition
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref SummaryBucketName

  CsvProcessorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  CsvDeleteRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  CsvProcessorS3Policy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${LambdaFunctionName}-s3-policy'
      Roles:
        - !Ref CsvProcessorRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::${BucketName}'
              - !Sub 'arn:aws:s3:::${BucketName}/*'
              - !Sub 'arn:aws:s3:::${SummaryBucketName}/*'
          - Effect: Allow
            Action:
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::${SummaryBucketName}'
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: '*'

  CsvDeleteS3Policy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${DeleteLambdaFunctionName}-s3-policy'
      Roles:
        - !Ref CsvDeleteRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:DeleteObject
              - s3:GetObject
            Resource:
              - !Sub 'arn:aws:s3:::${BucketName}/*'
              # Compatibility: some existing records were uploaded to this legacy bucket.
              - 'arn:aws:s3:::nyu-fullstack-csv/*'
              - !Sub 'arn:aws:s3:::${SummaryBucketName}/*'
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: '*'

  CsvProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: s3_processor_lambda.lambda_handler
      Runtime: !Ref LambdaRuntime
      Role: !GetAtt CsvProcessorRole.Arn
      Code:
        S3Bucket: !Ref LambdaS3CodeBucket
        S3Key: !Ref LambdaS3CodeKey
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      Environment:
        Variables:
          BACKEND_VERIFY_URL: !Ref BackendVerifyUrl
          VERIFY_SECRET: !Ref VerifySecret
          MAX_ROWS_TO_VALIDATE: !Ref MaxRowsToValidate
          VALIDATE_FULL_FILE: !Ref ValidateFullFile
          FAILED_PREFIX: failed/
          COPY_ON_FAILURE: 'true'
          S3_READ_RETRIES: '3'
          SUMMARY_BUCKET_NAME: !Ref SummaryBucketName

  CsvDeleteFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: s3_delete_lambda.lambda_handler
      Runtime: !Ref LambdaRuntime
      Role: !GetAtt CsvDeleteRole.Arn
      Code:
        S3Bucket: !Ref LambdaS3CodeBucket
        S3Key: !Ref LambdaS3CodeKey
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          BUCKET_NAME: !Ref BucketName
          BACKEND_BASE_URL: !Ref BackendBaseUrl
          VERIFY_SECRET: !Ref VerifySecret
          SUMMARY_BUCKET_NAME: !Ref SummaryBucketName

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref BucketName
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'

  ProcessorFunctionArn:
    Description: ARN of the deployed processor Lambda
    Value: !GetAtt CsvProcessorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ProcessorFunctionArn'

  DeleteLambdaFunctionArn:
    Description: ARN of the deployed Delete Lambda function
    Value: !GetAtt CsvDeleteFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DeleteFunctionArn'

  SummaryBucketName:
    Description: Name of the summary S3 bucket
    Value: !Ref SummaryBucketName
    Export:
      Name: !Sub '${AWS::StackName}-SummaryBucketName'

  ProcessorRoleName:
    Description: Name of the processor IAM role
    Value: !Ref CsvProcessorRole
    Export:
      Name: !Sub '${AWS::StackName}-ProcessorRoleName'
