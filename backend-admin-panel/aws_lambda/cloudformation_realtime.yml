AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Realtime CloudFormation template for CSV processor. This template requires
  the core stack name (CoreStackName) to import resources created in the core
  stack (bucket name, processor function ARN and processor role name).

Parameters:
  CoreStackName:
    Type: String
    Description: The stack name of the core stack (used to import exported values).

  LambdaS3CodeBucket:
    Type: String
    Description: S3 bucket that holds the Lambda deployment package (zip).

  LambdaS3CodeKey:
    Type: String
    Description: S3 key for the Lambda zip file (object key).

  LambdaFunctionName:
    Type: String
    Default: csv-processor-lambda

  LambdaRuntime:
    Type: String
    Default: python3.12

  CognitoUserPoolId:
    Type: String
    Default: ''

  CognitoClientId:
    Type: String
    Default: ''
  BackendBaseUrl:
    Type: String
    Default: ''
    Description: Base URL of the backend service (e.g. https://api.example.com) used by the HTTP integration.

Resources:
  # Dead-letter queue and main queue for realtime processing
  CsvDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${LambdaFunctionName}-dlq'
      VisibilityTimeout: 300

  CsvQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${LambdaFunctionName}-queue'
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt CsvDLQ.Arn
        maxReceiveCount: 5
      VisibilityTimeout: 300

  CsvQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref CsvQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3SendMessage
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt CsvQueue.Arn
            Condition:
              ArnEquals:
                'aws:SourceArn': !Sub
                  - 'arn:aws:s3:::${BucketName}'
                  - BucketName: !ImportValue
                      'Fn::Sub': '${CoreStackName}-BucketName'

  # HTTP API + Cognito JWT Authorizer
  CsvHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${LambdaFunctionName}-http-api'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
        AllowHeaders: ['Authorization', 'Content-Type']

  CsvHttpApiAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref CsvHttpApi
      Name: CognitoJwtAuthorizer
      AuthorizerType: JWT
      IdentitySource:
        - '$request.header.Authorization'
      JwtConfiguration:
        Issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}'
        Audience:
          - !Ref CognitoClientId

  CsvHttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref CsvHttpApi
      IntegrationType: HTTP_PROXY
      IntegrationUri: !Ref BackendBaseUrl
      IntegrationMethod: ANY
      PayloadFormatVersion: '1.0'

  CsvHttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref CsvHttpApi
      RouteKey: 'ANY /{proxy+}'
      AuthorizationType: JWT
      AuthorizerId: !Ref CsvHttpApiAuthorizer
      Target: !Join ['', ['integrations/', !Ref CsvHttpApiIntegration]]

  CsvHttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref CsvHttpApi
      AutoDeploy: true
      StageName: prod

  # WebSocket API and connection management
  CsvWebsocketConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${LambdaFunctionName}-ws-connections'
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  WebsocketLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  WebsocketDDBPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${LambdaFunctionName}-ws-ddb-policy'
      Roles:
        - !Ref WebsocketLambdaRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:DeleteItem
              - dynamodb:GetItem
            Resource: !GetAtt CsvWebsocketConnectionsTable.Arn

  CsvWebsocketConnectFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${LambdaFunctionName}-ws-connect'
      Handler: websocket_connect.lambda_handler
      Runtime: !Ref LambdaRuntime
      Role: !GetAtt WebsocketLambdaRole.Arn
      Code:
        S3Bucket: !Ref LambdaS3CodeBucket
        S3Key: !Ref LambdaS3CodeKey
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref CsvWebsocketConnectionsTable

  CsvWebsocketDisconnectFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${LambdaFunctionName}-ws-disconnect'
      Handler: websocket_disconnect.lambda_handler
      Runtime: !Ref LambdaRuntime
      Role: !GetAtt WebsocketLambdaRole.Arn
      Code:
        S3Bucket: !Ref LambdaS3CodeBucket
        S3Key: !Ref LambdaS3CodeKey
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref CsvWebsocketConnectionsTable

  CsvWebsocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${LambdaFunctionName}-ws-api'
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: '$request.body.action'

  CsvWebsocketConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref CsvWebsocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CsvWebsocketConnectFunction.Arn}/invocations'
      PayloadFormatVersion: '1.0'

  CsvWebsocketDisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref CsvWebsocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CsvWebsocketDisconnectFunction.Arn}/invocations'
      PayloadFormatVersion: '1.0'

  CsvWebsocketConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref CsvWebsocketApi
      RouteKey: '$connect'
      Target: !Join ['', ['integrations/', !Ref CsvWebsocketConnectIntegration]]

  CsvWebsocketDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref CsvWebsocketApi
      RouteKey: '$disconnect'
      Target: !Join ['', ['integrations/', !Ref CsvWebsocketDisconnectIntegration]]

  CsvWebsocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref CsvWebsocketApi
      AutoDeploy: true
      StageName: ws

  PermissionForApiToInvokeConnectLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CsvWebsocketConnectFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CsvWebsocketApi}/*/$connect'

  PermissionForApiToInvokeDisconnectLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CsvWebsocketDisconnectFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CsvWebsocketApi}/*/$disconnect'

  # Attach realtime-specific permissions to the processor role exported by core stack
  CsvProcessorRealtimePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${LambdaFunctionName}-realtime-extras'
      Roles:
        - !ImportValue
            'Fn::Sub': '${CoreStackName}-ProcessorRoleName'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - execute-api:ManageConnections
            Resource:
              - !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CsvWebsocketApi}/*/POST/@connections/*'
          - Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource:
              - !GetAtt CsvQueue.Arn

  # Event Source Mapping for SQS -> Processor function (function ARN imported from core stack)
  CsvProcessorEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt CsvQueue.Arn
      FunctionName: !ImportValue
        'Fn::Sub': '${CoreStackName}-ProcessorFunctionArn'
      Enabled: true
      BatchSize: 10

  # Custom Resource Lambda used to inject S3 notification configuration into existing buckets
  CustomResourceLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3NotificationModifierPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetBucketNotification
                  - s3:PutBucketNotification
                  - s3:CreateBucket
                Resource:
                  - '*'

  CsvNotificationCustomResourceFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${LambdaFunctionName}-notification-injector'
      Handler: index.lambda_handler
      Runtime: python3.11
      Role: !GetAtt CustomResourceLambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import json
          import urllib.request

          s3 = boto3.client('s3')

          def lambda_handler(event, context):
              print("Received Custom Resource Event:", json.dumps(event))
              request_type = event['RequestType']
              props = event['ResourceProperties']
              bucket_name = props['BucketName']
              queue_arn = props['QueueArn']
              
              status = "SUCCESS"
              response_data = {}
              
              try:
                  if request_type in ['Create', 'Update']:
                      try:
                        config = s3.get_bucket_notification_configuration(Bucket=bucket_name)
                        config.pop('ResponseMetadata', None)
                      except Exception as e:
                        try:
                          from botocore.exceptions import ClientError
                          code = None
                          if isinstance(e, ClientError):
                            code = e.response.get('Error', {}).get('Code')
                          if code == 'NoSuchBucket':
                            print(f"Bucket {bucket_name} missing; attempting to create it.")
                            s3.create_bucket(Bucket=bucket_name)
                            config = {}
                            print(f"Created missing bucket: {bucket_name}")
                          else:
                            print("No configuration metadata found or error reading, instantiating blank structure.")
                            config = {}
                        except Exception as e2:
                          print(f"Failed while handling missing bucket: {e2}")
                          raise
                      
                      queue_configs = config.get('QueueConfigurations', [])
                      already_configured = False
                      for item in queue_configs:
                          if item.get('QueueArn') == queue_arn and 's3:ObjectCreated:Put' in item.get('Events', []):
                              already_configured = True
                              break
                      
                      if not already_configured:
                          queue_configs.append({
                              'Id': f'CFN-Injected-Trigger-{context.aws_request_id[:8]}',
                              'QueueArn': queue_arn,
                              'Events': ['s3:ObjectCreated:Put']
                          })
                          config['QueueConfigurations'] = queue_configs
                          s3.put_bucket_notification_configuration(Bucket=bucket_name, NotificationConfiguration=config)
                          print(f"Successfully configured notifications on bucket: {bucket_name}")
                  
                  elif request_type == 'Delete':
                      try:
                          config = s3.get_bucket_notification_configuration(Bucket=bucket_name)
                          config.pop('ResponseMetadata', None)
                          queue_configs = config.get('QueueConfigurations', [])
                          scrubbed_configs = [item for item in queue_configs if item.get('QueueArn') != queue_arn]
                          config['QueueConfigurations'] = scrubbed_configs
                          s3.put_bucket_notification_configuration(Bucket=bucket_name, NotificationConfiguration=config)
                          print(f"Successfully scrubbed target configuration from bucket: {bucket_name}")
                      except Exception as e:
                          print(f"Skipping teardown modifications cleanly (bucket may already be removed or missing): {e}")
              except Exception as e:
                  print(f"Failed handling custom event runtime logic: {e}")
                  if request_type != 'Delete':
                      status = "FAILED"
                      response_data = {"Error": str(e)}
              
              send_cloudformation_signal(event, context, status, response_data)

          def send_cloudformation_signal(event, context, status, response_data):
              payload = json.dumps({
                  "Status": status,
                  "Reason": f"See CloudWatch Streams: {context.log_stream_name}",
                  "PhysicalResourceId": event.get('PhysicalResourceId', context.log_stream_name),
                  "StackId": event['StackId'],
                  "RequestId": event['RequestId'],
                  "LogicalResourceId": event['LogicalResourceId'],
                  "Data": response_data
              }).encode('utf-8')
              request = urllib.request.Request(
                  event['ResponseURL'],
                  data=payload,
                  headers={"content-type": "", "content-length": str(len(payload))},
                  method="PUT"
              )
              try:
                  with urllib.request.urlopen(request) as connection:
                      print(f"CloudFormation callback delivered successfully. HTTP Status: {connection.status}")
              except Exception as error:
                  print(f"Failed pushing response block to CloudFormation callback endpoint: {error}")

  CsvExistingBucketNotificationTrigger:
    Type: Custom::S3NotificationTrigger
    Properties:
      ServiceToken: !GetAtt CsvNotificationCustomResourceFunction.Arn
      BucketName:
        !ImportValue
          'Fn::Sub': '${CoreStackName}-BucketName'
      QueueArn: !GetAtt CsvQueue.Arn

Outputs:
  ApiGatewayEndpoint:
    Description: HTTP API endpoint
    Value: !GetAtt CsvHttpApi.ApiEndpoint

  WebsocketApiId:
    Description: Websocket API id
    Value: !Ref CsvWebsocketApi
