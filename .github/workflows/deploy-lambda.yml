name: Deploy CSV Processor Lambda

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Lambda via script
        run: |
          cd backend-admin-panel/aws_lambda
          chmod +x deploy_lambda.sh
          ./deploy_lambda.sh \
            --artifact-bucket "${{ secrets.ARTIFACT_BUCKET }}" \
            --artifact-key "${{ secrets.ARTIFACT_KEY }}" \
            --bucket-name "${{ secrets.CSV_BUCKET }}" \
            --stack-name "${{ secrets.CFN_STACK_NAME }}" \
            --backend-verify-url "${{ secrets.BACKEND_VERIFY_URL }}" \
            --verify-secret "${{ secrets.VERIFY_SECRET }}" \
            --lambda-function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}" \
            --max-rows "${{ secrets.MAX_ROWS_TO_VALIDATE }}" \
            --validate-full "${{ secrets.VALIDATE_FULL_FILE }}"
